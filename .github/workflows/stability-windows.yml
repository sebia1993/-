name: Windows Stability Soak

on:
  schedule:
    # Sunday 18:23 UTC = Monday 03:23 KST
    - cron: "23 18 * * 0"
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Soak duration in minutes"
        required: true
        default: "45"
        type: choice
        options:
          - "30"
          - "45"
          - "60"

permissions:
  contents: read

concurrency:
  group: windows-stability-soak
  cancel-in-progress: false

jobs:
  upload-tcp-restart-soak:
    runs-on: windows-latest
    timeout-minutes: 70
    env:
      SOAK_DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '45' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --require-hashes -r requirements-windows.lock

      - name: Run baseline tests
        shell: pwsh
        run: |
          python -m pytest -q

      - name: Run upload TCP and restart soak
        shell: pwsh
        run: |
          python tools/run_windows_stability_soak.py `
            --duration-minutes $env:SOAK_DURATION_MINUTES `
            --summary-path windows-soak-summary.json

      - name: Write soak summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path windows-soak-summary.json) {
            "## Windows stability soak" >> $env:GITHUB_STEP_SUMMARY
            "``````json" >> $env:GITHUB_STEP_SUMMARY
            Get-Content windows-soak-summary.json >> $env:GITHUB_STEP_SUMMARY
            "``````" >> $env:GITHUB_STEP_SUMMARY
          }
