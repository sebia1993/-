name: Release Windows ZIP

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.3.0"
        required: true
        default: "v0.4.5-rc.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-zip:
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --require-hashes -r requirements-windows.lock

      - name: Run source checks
        shell: pwsh
        run: |
          python -m compileall app_version.py app.py bounded_server.py probe_client.py startup_ports.py runtime_stability.py network_sustained.py sustained_excel.py excel_report.py network_measurement.py result_storage.py network_probe tests tools
          node --check static/network_check.js
          node --check static/network_sustained.js
          node --check static/network_probe.js
          node --check static/throughput_chart.js
          python -m pytest -q

      - name: Build Windows release ZIP
        shell: pwsh
        run: |
          .\tools\build_windows_release.ps1 -Version $env:RELEASE_VERSION

      - name: Upload ZIP to GitHub Release
        shell: pwsh
        run: |
          $zip = "dist/internal-upload_${env:RELEASE_VERSION}_windows.zip"
          $sha = "$zip.sha256"
          $notes = "dist/release_notes_${env:RELEASE_VERSION}.md"
          $title = "$env:RELEASE_VERSION - 사내 업로드 Windows 안정성 개선"

          if (-not (Test-Path $zip)) {
            throw "Missing release ZIP: $zip"
          }
          if (-not (Test-Path $notes)) {
            throw "Missing release notes: $notes"
          }
          if (-not (Test-Path $sha)) {
            throw "Missing SHA256 file: $sha"
          }

          $isPrerelease = $env:RELEASE_VERSION -match '-rc\.\d+$'

          gh release view $env:RELEASE_VERSION --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $env:RELEASE_VERSION already exists. Publish a new version instead of replacing an existing asset."
          }

          if ($isPrerelease) {
            gh release create $env:RELEASE_VERSION $zip $sha --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file $notes --prerelease
          }
          else {
            gh release create $env:RELEASE_VERSION $zip $sha --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $title --notes-file $notes
          }
